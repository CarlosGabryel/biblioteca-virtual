<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Gerenciar Livros - Biblioteca Virtual</title>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="index.html">Empréstimos</a>
            <a href="alunos.html">Alunos</a>
            <a href="livros.html" class="active">Livros</a>
        </nav>

        <h1>Gerenciamento de Acervo</h1>

        <div class="section">
            <h2>Cadastrar Novo Livro</h2>
            <form id="form-livro">
                <div class="form-group">
                    <label for="livro-nome">Título do Livro:</label>
                    <input type="text" id="livro-nome" placeholder="Ex: Clean Code" required>
                </div>

                <div class="form-group">
                    <label for="livro-isbn">ISBN:</label>
                    <input type="text" id="livro-isbn" placeholder="Ex: 978-8576082675" required>
                </div>

                <div class="form-group">
                    <label for="livro-autor">Autor:</label>
                    <input type="text" id="livro-autor" placeholder="Ex: Robert C. Martin" required>
                </div>

                <div class="form-group">
                    <label for="livro-qtd">Quantidade em Estoque:</label>
                    <input type="number" id="livro-qtd" min="1" placeholder="Ex: 5" required>
                </div>
                
                <button type="submit">Cadastrar no Acervo</button>
            </form>
        </div>

        <div class="section">
            <h2>Livros no Acervo</h2>
            <table id="tabela-livros" class="data-table">
                <thead>
                    <tr>
                        <th>ISBN</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Qtd. Disponível</th>
                        <th>Ações</th> </tr>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" style="text-align:center;">Carregando acervo...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/livros.js"></script>
</body>
</html>
